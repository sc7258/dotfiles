# --- 폰트 & 디자인 ---
font_family      Fira Code
font_size        12.0
background_opacity 0.85
window_padding_width 10
cursor_shape block

# --- 탭 바 스타일 ---
# 윈도우 안쪽 여백 (가독성 향상)
window_padding_width 10

tab_title_template "{index}: {title}"

# 탭 바 위치 (top 또는 bottom)
tab_bar_edge top

# 탭 바 스타일 (fade, slant, separator, powerline 등)
tab_bar_style powerline
tab_powerline_style slanted

# 활성화된 탭의 스타일 지정
active_tab_foreground   #000
active_tab_background   #eee
active_tab_font_style   bold

# --- [추가] 복사 및 붙여넣기 설정 ---
copy_on_select yes
strip_trailing_spaces always
# 마우스 우클릭으로 붙여넣기 (선택 사항)
mouse_map right click ungrabbed paste_from_clipboard

# --- [추가] 탭 간 빠른 이동 (Ctrl + Shift + 숫자) ---
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5
map ctrl+shift+6 goto_tab 6
map ctrl+shift+7 goto_tab 7
map ctrl+shift+8 goto_tab 8
map ctrl+shift+9 goto_tab 9

# --- 단축키 설정 ---
map ctrl+shift+enter new_window
map ctrl+shift+t     new_tab
map ctrl+shift+f5    load_config_file

map ctrl+shift+, move_tab_forward
map ctrl+shift+. move_tab_backward

map ctrl+shift+a launch --stdin-source=@screen_scrollback --type=clipboard
map ctrl+shift+g copy_last_command_output

map ctrl+shift+a select_all
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

clipboard_control write-clipboard write-primary

# Kitty 내부에서 ibus/fcitx5 입력기 모듈을 강제로 활성화
env GLFW_IM_MODULE=ibus
# 오른쪽 Alt(한영키) 신호 방해 금지
wayland_enable_ime yes
clear_all_shortcuts no
